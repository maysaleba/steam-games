name: Steam Deals Pipeline

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 8:00 PM UTC
    # = 12:00 PM PST
    # = 1:00 PM PDT
    # Safe buffer after Steam refresh
    - cron: "0 20 * * *"

jobs:
  steam-deals:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ===== CHECKOUT REPO =====
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== SETUP PYTHON =====
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===== INSTALL DEPENDENCIES =====
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pillow

      # ===== RUN DAILY STEAM FETCH =====
      - name: Run getDailySteam.py
        env:
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
        run: python getDailySteam.py

      # ===== UPLOAD CSV ARTIFACT =====
      - name: Upload steam_deals_today.csv
        uses: actions/upload-artifact@v4
        with:
          name: steam_deals_today
          path: steam_deals_today.csv

      # ===== GENERATE IMAGES =====
      - name: Run createImageSteam.py
        run: python createImageSteam.py

      # ===== COMMIT UPDATED HISTORY/CACHE =====
      - name: Commit updated history/cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add steam_posted_recently.json
          git add itad_appid_cache.json

          git diff --cached --quiet || git commit -m "Update Steam history/cache"

          git push

      # ===== POST TO FACEBOOK =====
      - name: Run facebookPostSteam.py
        env:
          FB_PAGE_ACCESS_TOKEN_LIVE: ${{ secrets.FB_PAGE_ACCESS_TOKEN_LIVE }}
        run: python facebookPostSteam.py
